<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Tasarım Stüdyosu - V3 (MemOS)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .svg-container { position: relative; overflow: hidden; }
        .svg-container svg { width: 100%; height: auto; max-height: 500px; transition: transform 0.3s ease; position: relative; z-index: 10; }
        .svg-container svg path.hexagon, .svg-container svg path.pentagon, .svg-container svg path.volleyball_panel { transition: fill 0.3s ease; }
        .zoom-in svg { transform: scale(1.5); }
        .reference-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; z-index: 20; pointer-events: none; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const fileToBase64 = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        const App = () => {
            const [ballType, setBallType] = useState('soccer');
            const [svgContent, setSvgContent] = useState('');
            const [panels, setPanels] = useState([]);
            const [strokeColor, setStrokeColor] = useState('#231916');
            
            // Ref Image
            const [referenceImages, setReferenceImages] = useState([]);
            const [activeRefIndex, setActiveRefIndex] = useState(0);
            const [refOpacity, setRefOpacity] = useState(0.0);
            
            // Memory State
            const [memoryDesigns, setMemoryDesigns] = useState([]);
            const [currentDesignId, setCurrentDesignId] = useState(null);
            
            const [apiKey, setApiKey] = useState(localStorage.getItem('anthropic_key') || '');
            const [isLoading, setIsLoading] = useState(false);
            const [zoom, setZoom] = useState(false);
            
            // Modal
            const [showMemory, setShowMemory] = useState(false);
            const [saveMeta, setSaveMeta] = useState({ name: '', summary: '', tags: '', is_golden: false });
            const [showSaveModal, setShowSaveModal] = useState(false);

            const svgRef = useRef(null);

            const initPanels = (type) => {
                const count = type === 'soccer' ? 32 : 18;
                return Array.from({length: count}).map((_, i) => ({ index: i, fill: '#ffffff', image: null }));
            };

            const loadMemory = async () => {
                try {
                    const res = await fetch("/api/designs");
                    if (res.ok) {
                        const data = await res.json();
                        setMemoryDesigns(data.designs || []);
                    }
                } catch(e) { console.error("Hafıza yüklenemedi", e); }
            };

            useEffect(() => { loadMemory(); }, []);

            useEffect(() => {
                setPanels(initPanels(ballType));
                fetch(`templates/${ballType}_blank.svg`).then(res => res.text()).then(text => setSvgContent(text));
            }, [ballType]);

            useEffect(() => {
                if (!svgRef.current) return;
                const doc = svgRef.current;
                const pathList = Array.from(doc.querySelectorAll('path[id^="panel-"]'));
                if(pathList.length === 0) return;

                let defs = doc.querySelector('defs');
                if(!defs) { defs = document.createElementNS("http://www.w3.org/2000/svg", "defs"); doc.querySelector('svg').prepend(defs); }

                const existingImages = doc.querySelectorAll('image.live-image'); existingImages.forEach(img => img.remove());
                const existingClips = doc.querySelectorAll('clipPath.live-clip'); existingClips.forEach(c => c.remove());

                panels.forEach((p, idx) => {
                    const pathElem = pathList[idx];
                    if(!pathElem) return;

                    const curStyle = pathElem.getAttribute('style') || '';
                    if(curStyle.includes('fill:')) pathElem.setAttribute('style', curStyle.replace(/fill:[^;]+/, `fill:${p.fill}`));
                    else pathElem.setAttribute('style', curStyle + `fill:${p.fill};`);

                    if (p.image && p.image.url_or_data) {
                        const pathId = pathElem.getAttribute('id');
                        const bbox = pathElem.getBBox();
                        const cx = bbox.x + bbox.width/2; const cy = bbox.y + bbox.height/2;
                        const side = Math.max(bbox.width, bbox.height) * p.image.scale * 1.5;

                        const clipId = `live_clip_${idx}`;
                        const clip = document.createElementNS("http://www.w3.org/2000/svg", "clipPath");
                        clip.setAttribute("id", clipId); clip.setAttribute("class", "live-clip");
                        const use = document.createElementNS("http://www.w3.org/2000/svg", "use");
                        use.setAttributeNS("http://www.w3.org/1999/xlink", "href", `#${pathId}`);
                        clip.appendChild(use); defs.appendChild(clip);

                        const img = document.createElementNS("http://www.w3.org/2000/svg", "image");
                        img.setAttribute("class", "live-image");
                        img.setAttribute("x", cx - side/2 + parseFloat(p.image.offset_x||0));
                        img.setAttribute("y", cy - side/2 + parseFloat(p.image.offset_y||0));
                        img.setAttribute("width", side); img.setAttribute("height", side);
                        img.setAttribute("opacity", p.image.opacity);
                        img.setAttribute("preserveAspectRatio", "xMidYMid slice");
                        img.setAttribute("clip-path", `url(#${clipId})`);
                        if(p.image.blend_mode !== 'normal') img.style.mixBlendMode = p.image.blend_mode;
                        img.setAttributeNS("http://www.w3.org/1999/xlink", "href", p.image.url_or_data);
                        doc.querySelector('svg').appendChild(img);
                    }
                });

                pathList.forEach(p => {
                    const curStyle = p.getAttribute('style') || '';
                    if(curStyle.includes('stroke:')) p.setAttribute('style', curStyle.replace(/stroke:[^;]+/, `stroke:${strokeColor}`));
                    else p.setAttribute('style', curStyle + `stroke:${strokeColor};`);
                });
            }, [panels, strokeColor, svgContent]);

            const updatePanel = (idx, key, val) => { const newP = [...panels]; newP[idx][key] = val; setPanels(newP); };
            const handlePanelImageUpload = async (idx, file) => {
                if(!file) return; const b64 = await fileToBase64(file);
                const newP = [...panels]; newP[idx].image = { url_or_data: b64, opacity: 1.0, scale: 1.0, offset_x: 0, offset_y: 0, blend_mode: "normal" }; setPanels(newP);
            };
            const updatePanelImage = (idx, key, val) => { const newP = [...panels]; newP[idx].image[key] = val; setPanels(newP); };
            const removePanelImage = (idx) => { const newP = [...panels]; newP[idx].image = null; setPanels(newP); };

            const handleRefUpload = async (e) => {
                if(!e.target.files[0]) return;
                const b64 = await fileToBase64(e.target.files[0]);
                setReferenceImages([...referenceImages, { data: b64, name: e.target.files[0].name }]);
                setActiveRefIndex(referenceImages.length);
            };

            const commitSaveDesign = async () => {
                if(!saveMeta.name) return alert("İsim zorunlu");
                const payload = {
                    id: currentDesignId,
                    name: saveMeta.name,
                    summary: saveMeta.summary,
                    tags: saveMeta.tags.split(",").map(t=>t.trim()).filter(t=>t),
                    is_golden: saveMeta.is_golden,
                    ballType, panels, strokeColor
                };
                
                try {
                    const res = await fetch("/api/designs", {
                        method: "POST", headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    const result = await res.json();
                    if(result.status === "ok") {
                        setCurrentDesignId(result.id);
                        setShowSaveModal(false);
                        loadMemory();
                    }
                } catch(e) { alert("Kayıt hatası"); }
            };

            const loadDesign = (d) => {
                setBallType(d.ballType);
                const newPanels = initPanels(d.ballType);
                d.panels.forEach(p => { if(p.index < newPanels.length) newPanels[p.index] = p; });
                setPanels(newPanels);
                setStrokeColor(d.strokeColor);
                setCurrentDesignId(d.id);
                setSaveMeta({ name: d.name, summary: d.summary||'', tags: (d.tags||[]).join(", "), is_golden: !!d.is_golden });
                setShowMemory(false);
            };

            const toggleGolden = async (d, e) => {
                e.stopPropagation();
                const payload = {...d, is_golden: !d.is_golden};
                await fetch("/api/designs", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
                loadMemory();
            };

            // YENI CLAUDE VISION ENTEGRASYONU
            const handleVisionDesign = async () => {
                if (!apiKey) return alert('Anthropic API anahtarı eksik.');
                if (referenceImages.length === 0) return alert('Lütfen referans görsel yükleyin.');
                localStorage.setItem('anthropic_key', apiKey);
                setIsLoading(true);
                
                const currentRef = referenceImages[activeRefIndex];
                const base64Data = currentRef.data.split(",")[1];
                const mediaType = currentRef.data.split(";")[0].split(":")[1];

                const promptText = `Bu bir futbol/voleybol topu görseli. Bu tasarımı 32 panelli (20 hexagon + 12 pentagon) klasik futbol topu şablonuna uyarlamam gerekiyor.
Görseldeki tasarımı analiz et ve şu JSON formatında çıktı ver:
{
  "tasarim_ozeti": "tasarımın 1-2 cümle özeti",
  "ana_renkler": ["#HEX1", "#HEX2", "#HEX3"],
  "baskin_motif": "geometrik/organik/illüzyon/sade vb.",
  "panel_dagilimi": {
    "hexagonlar": [ {"index": 0, "fill": "#HEX"}, {"index": 1, "fill": "#HEX"} ... ],
    "pentagonlar": [ {"index": 20, "fill": "#HEX"} ... ]
  },
  "stroke_color": "#000",
  "ekvator_efekti": "varsa açıkla, yoksa null",
  "ozel_efektler": "gradient, illüzyon vb. varsa",
  "uygulama_notlari": "dikkat edilmesi gerekenler"
}
Not: Hexagon indexleri 0-19 arasıdır. Pentagon indexleri 20-31 arasıdır.
Sadece JSON döndür, başka açıklama yapma.`;

                try {
                    const res = await fetch("https://api.anthropic.com/v1/messages", {
                        method: "POST",
                        headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerously-allow-browser": "true" },
                        body: JSON.stringify({
                            model: "claude-3-5-sonnet-20241022", max_tokens: 4096,
                            messages: [
                                { role: "user", content: [
                                    { type: "image", source: { type: "base64", media_type: mediaType, data: base64Data } },
                                    { type: "text", text: promptText }
                                ]}
                            ]
                        })
                    });
                    const result = await res.json();
                    if(result.content) {
                        const jsonStr = result.content[0].text.replace(/```json/g, '').replace(/```/g, '').trim();
                        const parsed = JSON.parse(jsonStr);
                        
                        setBallType("soccer");
                        const newPanels = initPanels("soccer");
                        
                        if(parsed.panel_dagilimi) {
                            if(parsed.panel_dagilimi.hexagonlar) parsed.panel_dagilimi.hexagonlar.forEach(p => { if(p.index<20) newPanels[p.index].fill = p.fill; });
                            if(parsed.panel_dagilimi.pentagonlar) parsed.panel_dagilimi.pentagonlar.forEach(p => { if(p.index>=20 && p.index<32) newPanels[p.index].fill = p.fill; });
                        }
                        setPanels(newPanels);
                        if(parsed.stroke_color) setStrokeColor(parsed.stroke_color);
                        alert(`Analiz Tamamlandı:\nÖzet: ${parsed.tasarim_ozeti}\nMotif: ${parsed.baskin_motif}\nNotlar: ${parsed.uygulama_notlari}`);
                    }
                } catch (e) { alert("Vision AI Hatası"); console.error(e); } finally { setIsLoading(false); }
            };

            // AI'NIN HAFIZAYI KULLANMASI
            const handleProactiveSuggest = async () => {
                if (!apiKey) return alert('API Key gerekli.');
                setIsLoading(true);
                
                const golden = memoryDesigns.filter(d => d.is_golden);
                const recent = memoryDesigns.slice(-5);
                
                const sysPrompt = `Sen Gözde Plastik / Prime Sports için top tasarım uzmanısın.
KULLANICI ZEVKİ (geçmiş altın örnekler):
${golden.map(d => `- "${d.name}": ${d.summary}, etiketler: ${(d.tags||[]).join(", ")}`).join("\n")}

SON ÜRETİLEN TASARIMLAR:
${recent.map(d => `- ${d.name}`).join("\n")}

Kullanıcı zevkini dikkate al. Altın örneklere bakarak "Daha önce yapılmamış yeni ve harika bir kombinasyon" düşün (trendlere veya mevsimsel ögelere uygun).
Sadece 32 panelli (0-19 hex, 20-31 pent) futbol topu için panel renk dağılımı (fill) JSON'u ver:
{
  "name": "Önerilen isim",
  "summary": "Neden bunu önerdin?",
  "stroke_color": "#HEX",
  "panels": [{"index":0, "fill":"#HEX"}...]
}
Sadece JSON döndür.`;

                try {
                    const res = await fetch("https://api.anthropic.com/v1/messages", {
                        method: "POST", headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerously-allow-browser": "true" },
                        body: JSON.stringify({
                            model: "claude-3-5-sonnet-20241022", max_tokens: 2000, system: sysPrompt,
                            messages: [{ role: "user", content: "Bana yeni bir tasarım öner ve uygula." }]
                        })
                    });
                    const result = await res.json();
                    if(result.content) {
                        const jsonStr = result.content[0].text.replace(/```json/g, '').replace(/```/g, '').trim();
                        const parsed = JSON.parse(jsonStr);
                        
                        setBallType("soccer");
                        const newPanels = initPanels("soccer");
                        parsed.panels.forEach(p => { if(p.index<32) newPanels[p.index].fill = p.fill; });
                        setPanels(newPanels);
                        setStrokeColor(parsed.stroke_color);
                        
                        setSaveMeta({ name: parsed.name, summary: parsed.summary, tags: 'oneri, ai', is_golden: false });
                        setCurrentDesignId(null);
                        alert(`Yapay Zeka Önerisi: ${parsed.name}\n\n${parsed.summary}`);
                    }
                } catch(e) { alert("AI Hatası"); console.error(e); } finally { setIsLoading(false); }
            };

            const downloadJson = () => {
                const data = { ball_type: ballType, panels, stroke_color: strokeColor };
                const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `tasarim_${Date.now()}.json`; a.click();
            };

            return (
                <div className="min-h-screen p-4 flex flex-col gap-4 max-w-[1600px] mx-auto text-sm">
                    <header className="flex justify-between items-center bg-white p-4 rounded-xl shadow border border-slate-200">
                        <div className="flex items-center gap-4">
                            <h1 className="text-2xl font-bold text-indigo-700">MemOS - Tasarım Stüdyosu</h1>
                            <button onClick={()=>setShowMemory(true)} className="bg-indigo-100 text-indigo-700 px-4 py-2 rounded font-medium hover:bg-indigo-200">Tasarım Geçmişi (Hafıza)</button>
                            <button onClick={handleProactiveSuggest} disabled={isLoading} className="bg-amber-100 text-amber-700 px-4 py-2 rounded font-bold hover:bg-amber-200 border border-amber-300 shadow-sm">
                                💡 Bana Bir Tasarım Öner
                            </button>
                        </div>
                        <div className="flex gap-2">
                            <input type="password" placeholder="Anthropic API Key" className="px-3 py-1 border rounded w-48 text-xs" value={apiKey} onChange={e=>setApiKey(e.target.value)} />
                        </div>
                    </header>

                    <div className="grid grid-cols-12 gap-4 h-[calc(100vh-120px)]">
                        
                        {/* Sol Menü: Paneller */}
                        <div className="col-span-3 bg-white p-4 rounded-xl border border-slate-200 flex flex-col gap-4 overflow-y-auto">
                            <div className="flex gap-2 items-center">
                                <select value={ballType} onChange={e=>setBallType(e.target.value)} className="flex-1 p-2 border rounded bg-slate-50 font-bold">
                                    <option value="soccer">Futbol Topu (32 Panel)</option>
                                    <option value="volleyball">Voleybol Topu (18 Panel)</option>
                                </select>
                                <input type="color" value={strokeColor} onChange={e=>setStrokeColor(e.target.value)} className="w-10 h-10 rounded border" title="Dikiş Rengi" />
                            </div>

                            <div className="space-y-3">
                                {panels.map((p, i) => (
                                    <div key={i} className="p-3 bg-slate-50 border rounded-lg">
                                        <div className="flex justify-between items-center mb-2">
                                            <span className="font-semibold text-xs text-slate-500">Panel {i}</span>
                                            <input type="color" value={p.fill} onChange={e=>updatePanel(i, 'fill', e.target.value)} className="w-8 h-8 rounded" />
                                        </div>
                                        
                                        {!p.image ? (
                                            <div className="mt-2">
                                                <input type="file" accept="image/*" className="hidden" id={`file-p-${i}`} onChange={e => handlePanelImageUpload(i, e.target.files[0])} />
                                                <label htmlFor={`file-p-${i}`} className="block text-center text-[10px] bg-indigo-50 text-indigo-600 py-1 rounded cursor-pointer border border-indigo-200 hover:bg-indigo-100">
                                                    + Görsel/Logo Gömdür
                                                </label>
                                            </div>
                                        ) : (
                                            <div className="mt-2 pt-2 border-t border-slate-200 text-xs flex flex-col gap-2">
                                                <div className="flex justify-between items-center">
                                                    <span className="text-indigo-600 font-semibold truncate w-20">Görsel Aktif</span>
                                                    <button onClick={()=>removePanelImage(i)} className="text-red-500 hover:text-red-700">Sil</button>
                                                </div>
                                                <div className="flex gap-2">
                                                    <input type="number" step="0.1" title="Ölçek" placeholder="Scale" value={p.image.scale} onChange={e=>updatePanelImage(i, 'scale', parseFloat(e.target.value))} className="w-1/3 p-1 border rounded" />
                                                    <input type="number" title="X Offset" placeholder="X" value={p.image.offset_x} onChange={e=>updatePanelImage(i, 'offset_x', parseFloat(e.target.value))} className="w-1/3 p-1 border rounded" />
                                                    <input type="number" title="Y Offset" placeholder="Y" value={p.image.offset_y} onChange={e=>updatePanelImage(i, 'offset_y', parseFloat(e.target.value))} className="w-1/3 p-1 border rounded" />
                                                </div>
                                                <select value={p.image.blend_mode} onChange={e=>updatePanelImage(i, 'blend_mode', e.target.value)} className="p-1 border rounded text-slate-600">
                                                    <option value="normal">Normal</option>
                                                    <option value="multiply">Multiply (Harmanla)</option>
                                                </select>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Orta: Önizleme */}
                        <div className="col-span-6 flex flex-col gap-4">
                            <div className="bg-white p-4 rounded-xl border border-slate-200 flex-1 flex flex-col relative">
                                <div className="flex justify-between items-center mb-2">
                                    <h3 className="font-bold">Canlı SVG Önizleme</h3>
                                    <div className="flex items-center gap-4">
                                        {referenceImages.length > 0 && (
                                            <div className="flex items-center gap-2 text-xs text-slate-500 bg-slate-100 px-2 py-1 rounded">
                                                <span>Ref Opacity:</span>
                                                <input type="range" min="0" max="1" step="0.1" value={refOpacity} onChange={e=>setRefOpacity(parseFloat(e.target.value))} className="w-20" />
                                            </div>
                                        )}
                                        <button onClick={()=>setZoom(!zoom)} className="text-xs bg-slate-100 px-3 py-1 rounded hover:bg-slate-200">{zoom ? "Zoom -" : "Zoom +"}</button>
                                    </div>
                                </div>
                                <div className={`bg-slate-50 flex-1 border rounded flex items-center justify-center svg-container ${zoom?'zoom-in':''}`}>
                                    <div dangerouslySetInnerHTML={{__html: svgContent}} ref={svgRef} className="w-full h-full flex justify-center items-center"></div>
                                    {referenceImages[activeRefIndex] && refOpacity > 0 && (
                                        <img src={referenceImages[activeRefIndex].data} className="reference-overlay" style={{opacity: refOpacity}} />
                                    )}
                                </div>
                            </div>

                            <div className="bg-white p-4 rounded-xl border border-slate-200 flex justify-between items-center">
                                <div>
                                    <div className="font-bold">{saveMeta.name || "İsimsiz Tasarım"}</div>
                                    <div className="text-xs text-slate-500">{saveMeta.summary || "Henüz kaydedilmedi"}</div>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={()=>{setCurrentDesignId(null); setSaveMeta({...saveMeta, name:saveMeta.name+' (Kopya)'}); setShowSaveModal(true)}} className="px-4 py-2 bg-slate-100 rounded hover:bg-slate-200 text-xs font-semibold">Kopyala ve Düzenle</button>
                                    <button onClick={()=>setShowSaveModal(true)} className="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 text-xs font-bold">Tasarımı Kaydet</button>
                                    <button onClick={downloadJson} className="px-4 py-2 bg-emerald-600 text-white rounded hover:bg-emerald-700 text-xs font-bold">SVG Çıktısı İçin İndir (.json)</button>
                                </div>
                            </div>
                        </div>

                        {/* Sağ: Referans & Vision */}
                        <div className="col-span-3 bg-white p-4 rounded-xl border border-slate-200 flex flex-col gap-4 overflow-y-auto">
                            <h3 className="font-bold text-slate-800 border-b pb-2">Görsel Yükle (Midjourney vb.)</h3>
                            <div>
                                <input type="file" accept="image/*" className="hidden" id="ref-upload" onChange={handleRefUpload} />
                                <label htmlFor="ref-upload" className="block text-center text-sm bg-slate-50 text-slate-600 py-4 rounded-lg cursor-pointer border-2 border-dashed border-slate-300 hover:bg-slate-100 transition">
                                    + Referans Görsel Ekle
                                </label>
                            </div>

                            {referenceImages.length > 0 && (
                                <div className="flex flex-col gap-2">
                                    <div className="flex gap-2 overflow-x-auto pb-2">
                                        {referenceImages.map((ref, idx) => (
                                            <button key={idx} onClick={()=>setActiveRefIndex(idx)} className={`px-3 py-1 text-xs rounded truncate max-w-24 ${activeRefIndex === idx ? 'bg-indigo-600 text-white' : 'bg-slate-100'}`}>
                                                {ref.name}
                                            </button>
                                        ))}
                                    </div>
                                    <div className="relative border rounded bg-black flex items-center justify-center p-1 min-h-[180px]">
                                        <img src={referenceImages[activeRefIndex].data} className="max-h-48 object-contain" />
                                    </div>
                                    
                                    <button onClick={handleVisionDesign} disabled={isLoading} className="w-full mt-2 bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-lg shadow font-bold text-sm transition">
                                        {isLoading ? "Analiz Ediliyor..." : "✨ Referans Görsel ile Tasarla"}
                                    </button>
                                    <p className="text-[10px] text-slate-500 text-center">Claude Vision, görseli analiz edip 32 panele otomatik renk ataması yapar.</p>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Tasarım Geçmişi Modalı */}
                    {showMemory && (
                        <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-50 p-8">
                            <div className="bg-white rounded-2xl w-full max-w-5xl h-full max-h-[800px] flex flex-col shadow-2xl overflow-hidden">
                                <div className="p-6 border-b flex justify-between items-center bg-slate-50">
                                    <h2 className="text-2xl font-bold text-slate-800">Tasarım Geçmişi (MemOS)</h2>
                                    <button onClick={()=>setShowMemory(false)} className="text-slate-500 hover:text-black">Kapat</button>
                                </div>
                                <div className="p-6 overflow-y-auto flex-1 bg-slate-100">
                                    <div className="grid grid-cols-3 gap-6">
                                        {memoryDesigns.map((d, i) => (
                                            <div key={i} onClick={()=>loadDesign(d)} className={`bg-white p-4 rounded-xl shadow-sm border-2 cursor-pointer hover:shadow-md transition ${d.is_golden ? 'border-amber-400' : 'border-transparent'}`}>
                                                <div className="flex justify-between items-start mb-2">
                                                    <h3 className="font-bold text-lg text-slate-800 truncate">{d.name}</h3>
                                                    <button onClick={(e)=>toggleGolden(d, e)} className="text-xl" title="Altın Örnek İşaretle">
                                                        {d.is_golden ? '⭐' : '☆'}
                                                    </button>
                                                </div>
                                                <div className="text-xs text-slate-500 mb-3 h-8 overflow-hidden">{d.summary}</div>
                                                <div className="flex flex-wrap gap-1">
                                                    {(d.tags||[]).map((t, idx) => <span key={idx} className="text-[10px] bg-slate-100 px-2 py-0.5 rounded text-slate-600">#{t}</span>)}
                                                </div>
                                                <div className="mt-4 pt-3 border-t text-[10px] text-slate-400">
                                                    Tarih: {new Date(d.created).toLocaleDateString()}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    {memoryDesigns.length === 0 && <div className="text-center text-slate-500 py-12">Henüz kaydedilmiş bir tasarım yok.</div>}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Kayıt Modalı */}
                    {showSaveModal && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
                            <div className="bg-white p-6 rounded-2xl w-[400px]">
                                <h2 className="text-xl font-bold mb-4">Tasarımı Kaydet</h2>
                                <div className="space-y-4">
                                    <div><label className="block text-xs font-bold mb-1">Tasarım Adı</label><input type="text" className="w-full border p-2 rounded" value={saveMeta.name} onChange={e=>setSaveMeta({...saveMeta, name: e.target.value})} /></div>
                                    <div><label className="block text-xs font-bold mb-1">Özet / Notlar</label><textarea className="w-full border p-2 rounded" value={saveMeta.summary} onChange={e=>setSaveMeta({...saveMeta, summary: e.target.value})}></textarea></div>
                                    <div><label className="block text-xs font-bold mb-1">Etiketler (Virgülle ayırın)</label><input type="text" className="w-full border p-2 rounded" value={saveMeta.tags} onChange={e=>setSaveMeta({...saveMeta, tags: e.target.value})} placeholder="luks, kirmizi, cocuk..." /></div>
                                    <label className="flex items-center gap-2 cursor-pointer">
                                        <input type="checkbox" checked={saveMeta.is_golden} onChange={e=>setSaveMeta({...saveMeta, is_golden: e.target.checked})} />
                                        <span className="text-sm font-bold text-amber-600">⭐ Altın Örnek (AI öğrensin)</span>
                                    </label>
                                </div>
                                <div className="mt-6 flex justify-end gap-2">
                                    <button onClick={()=>setShowSaveModal(false)} className="px-4 py-2 bg-slate-200 rounded">İptal</button>
                                    <button onClick={commitSaveDesign} className="px-4 py-2 bg-indigo-600 text-white rounded font-bold">Kaydet</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
