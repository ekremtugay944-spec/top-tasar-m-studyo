<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Tasarım Stüdyosu - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
        .svg-container { position: relative; overflow: hidden; }
        .svg-container svg { width: 100%; height: auto; max-height: 600px; transition: transform 0.3s ease; }
        .svg-container svg path.hexagon, .svg-container svg path.pentagon, .svg-container svg path.volleyball_panel { transition: fill 0.3s ease, stroke 0.3s ease; }
        .zoom-in svg { transform: scale(1.5); }
        /* Özel scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const THEMES = [
            { name: "Klasik (Siyah/Beyaz)", type: "soccer", panels: Array.from({length:32}).map((_,i)=>({index:i, fill_type:"solid", fill: (i>19) ? "#000000" : "#ffffff"})) },
            { name: "Türkiye Teması", type: "soccer", panels: Array.from({length:32}).map((_,i)=>({index:i, fill_type:"solid", fill: (i%2===0) ? "#E30A17" : "#ffffff"})) },
            { name: "Barcelona", type: "soccer", panels: Array.from({length:32}).map((_,i)=>({index:i, fill_type:"solid", fill: (i%2===0) ? "#A50044" : "#004D98"})) },
            { name: "Galatasaray", type: "soccer", panels: Array.from({length:32}).map((_,i)=>({index:i, fill_type:"solid", fill: (i%2===0) ? "#A90432" : "#FDB912"})) },
            { name: "Fenerbahçe", type: "soccer", panels: Array.from({length:32}).map((_,i)=>({index:i, fill_type:"solid", fill: (i%2===0) ? "#001e61" : "#ffed00"})) },
            { name: "Beşiktaş", type: "soccer", panels: Array.from({length:32}).map((_,i)=>({index:i, fill_type:"solid", fill: (i%2===0) ? "#000000" : "#ffffff"})) },
            { name: "Lüks Altın", type: "soccer", panels: Array.from({length:32}).map((_,i)=>({index:i, fill_type:"solid", fill: (i>19) ? "#D4AF37" : "#111111"})), stroke: "#D4AF37" },
            { name: "Çocuk Eğlence", type: "soccer", panels: Array.from({length:32}).map((_,i)=>{const c=["#FF5722","#FFEB3B","#4CAF50","#00BCD4","#E91E63"]; return {index:i, fill_type:"solid", fill: c[i%c.length]}}) }
        ];

        const App = () => {
            const [ballType, setBallType] = useState('soccer');
            const [svgContent, setSvgContent] = useState('');
            const [panels, setPanels] = useState([]);
            const [strokeColor, setStrokeColor] = useState('#231916');
            const [logos, setLogos] = useState([]);
            const [naturalLanguage, setNaturalLanguage] = useState('');
            const [apiKey, setApiKey] = useState(localStorage.getItem('anthropic_key') || '');
            const [isLoading, setIsLoading] = useState(false);
            const [zoom, setZoom] = useState(false);
            
            const [savedDesigns, setSavedDesigns] = useState(JSON.parse(localStorage.getItem('saved_designs') || '[]'));
            const [showThemes, setShowThemes] = useState(false);
            
            const svgRef = useRef(null);

            // Başlangıç panellerini oluştur
            const initPanels = (type) => {
                const count = type === 'soccer' ? 32 : 18;
                return Array.from({length: count}).map((_, i) => ({
                    index: i,
                    fill_type: 'solid',
                    fill: '#ffffff',
                    gradient: {from: '#ffffff', to: '#000000', direction: 'horizontal', type: 'linear'},
                    pattern: {type: 'stripes', color1: '#ffffff', color2: '#000000'}
                }));
            };

            useEffect(() => {
                setPanels(initPanels(ballType));
                fetch(`templates/${ballType}_blank.svg`)
                    .then(res => res.text())
                    .then(text => setSvgContent(text))
                    .catch(err => console.error("SVG Yükleme Hatası:", err));
            }, [ballType]);

            // SVG Canlı Güncelleme
            useEffect(() => {
                if (!svgRef.current) return;
                const doc = svgRef.current;
                
                // Varsayılan id listesi (önce topology'den, yoksa doc'tan çekilebilir ama basitçe class üzerinden de gidebiliriz)
                // soccer için panel-hex-* ve panel-pent-*, voleybol için panel-vb-*
                const pathList = Array.from(doc.querySelectorAll('path[id^="panel-"]'));
                if(pathList.length === 0) return;

                let defs = doc.querySelector('defs');
                if(!defs) {
                    defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
                    doc.querySelector('svg').prepend(defs);
                }

                panels.forEach((p, idx) => {
                    const pathElem = pathList[idx];
                    if(!pathElem) return;

                    let fillVal = p.fill;
                    
                    if (p.fill_type === 'gradient') {
                        const gid = `live_grad_${idx}`;
                        let grad = doc.querySelector(`#${gid}`);
                        if(!grad) {
                            grad = document.createElementNS("http://www.w3.org/2000/svg", p.gradient.type === 'linear' ? "linearGradient" : "radialGradient");
                            grad.setAttribute("id", gid);
                            defs.appendChild(grad);
                        } else {
                            grad.innerHTML = ''; // reset
                        }
                        
                        if(p.gradient.type === 'linear') {
                            if(p.gradient.direction === 'vertical') { grad.setAttribute("x1","0%"); grad.setAttribute("y1","0%"); grad.setAttribute("x2","0%"); grad.setAttribute("y2","100%"); }
                            else if(p.gradient.direction === 'diagonal') { grad.setAttribute("x1","0%"); grad.setAttribute("y1","0%"); grad.setAttribute("x2","100%"); grad.setAttribute("y2","100%"); }
                            else { grad.setAttribute("x1","0%"); grad.setAttribute("y1","0%"); grad.setAttribute("x2","100%"); grad.setAttribute("y2","0%"); }
                        }
                        
                        const s1 = document.createElementNS("http://www.w3.org/2000/svg", "stop");
                        s1.setAttribute("offset", "0%"); s1.setAttribute("stop-color", p.gradient.from);
                        const s2 = document.createElementNS("http://www.w3.org/2000/svg", "stop");
                        s2.setAttribute("offset", "100%"); s2.setAttribute("stop-color", p.gradient.to);
                        grad.appendChild(s1); grad.appendChild(s2);
                        fillVal = `url(#${gid})`;
                    } 
                    else if (p.fill_type === 'pattern') {
                        const pid = `live_patt_${idx}`;
                        let patt = doc.querySelector(`#${pid}`);
                        if(!patt) {
                            patt = document.createElementNS("http://www.w3.org/2000/svg", "pattern");
                            patt.setAttribute("id", pid);
                            patt.setAttribute("width", "20"); patt.setAttribute("height", "20");
                            patt.setAttribute("patternUnits", "userSpaceOnUse");
                            defs.appendChild(patt);
                        } else {
                            patt.innerHTML = '';
                        }
                        const bg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                        bg.setAttribute("width", "20"); bg.setAttribute("height", "20"); bg.setAttribute("fill", p.pattern.color1);
                        patt.appendChild(bg);
                        
                        const pt = p.pattern.type;
                        if(pt === 'stripes') {
                            const fg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                            fg.setAttribute("width", "10"); fg.setAttribute("height", "20"); fg.setAttribute("fill", p.pattern.color2);
                            patt.appendChild(fg);
                        } else if(pt === 'dots') {
                            const fg = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                            fg.setAttribute("cx", "10"); fg.setAttribute("cy", "10"); fg.setAttribute("r", "5"); fg.setAttribute("fill", p.pattern.color2);
                            patt.appendChild(fg);
                        }
                        fillVal = `url(#${pid})`;
                    }

                    const curStyle = pathElem.getAttribute('style') || '';
                    if(curStyle.includes('fill:')) pathElem.setAttribute('style', curStyle.replace(/fill:[^;]+/, `fill:${fillVal}`));
                    else pathElem.setAttribute('style', curStyle + `fill:${fillVal};`);
                });

                pathList.forEach(p => {
                    const curStyle = p.getAttribute('style') || '';
                    if(curStyle.includes('stroke:')) p.setAttribute('style', curStyle.replace(/stroke:[^;]+/, `stroke:${strokeColor}`));
                    else p.setAttribute('style', curStyle + `stroke:${strokeColor};`);
                });

                // Canlı önizlemede logo eklemek zordur çünkü bbox hesaplaması lazımdır.
                // Bu yüzden basit bir proxy gösterim ya da statik bırakıyoruz şimdilik, generator halledecek.

            }, [panels, strokeColor, svgContent]);

            const updatePanel = (idx, key, val, subkey) => {
                const newP = [...panels];
                if(subkey) newP[idx][key][subkey] = val;
                else newP[idx][key] = val;
                setPanels(newP);
            };

            const addLogo = () => setLogos([...logos, {panel_index: 0, url_or_data: '', opacity: 1.0, scale: 0.5}]);
            const updateLogo = (idx, k, v) => { const l=[...logos]; l[idx][k]=v; setLogos(l); };

            const saveDesign = () => {
                const name = prompt("Tasarım adı:");
                if(!name) return;
                const ds = [...savedDesigns, { name, ballType, panels, strokeColor, logos }];
                setSavedDesigns(ds);
                localStorage.setItem('saved_designs', JSON.stringify(ds));
            };
            
            const loadDesign = (d) => {
                setBallType(d.ballType);
                setPanels(d.panels);
                if(d.strokeColor) setStrokeColor(d.strokeColor);
                if(d.logos) setLogos(d.logos);
                setShowThemes(false);
            };

            const handleAIProcess = async () => {
                if (!apiKey) return alert('Anthropic API anahtarı eksik.');
                localStorage.setItem('anthropic_key', apiKey);
                setIsLoading(true);
                
                const sysPrompt = `Sen bir futbol/voleybol topu tasarım uzmanısın. Kullanıcı doğal dilde topu tarif eder, sen bunu yapılandırılmış JSON'a çevirirsin.
Top yapısı:
- Futbol topu: 32 panel (panel index 0-31. 0-19 Hexagon, 20-31 Pentagon)
- Voleybol topu: 18 panel (panel index 0-17)
Çıktı şeması:
{
  "ball_type": "soccer" | "volleyball",
  "panels": [ {"index": 0, "fill_type": "solid" | "gradient" | "pattern", "fill": "#HEX", "gradient": {"from": "#HEX", "to": "#HEX", "direction": "horizontal|vertical|diagonal", "type": "linear|radial"}, "pattern": {"type": "stripes|dots", "color1": "#HEX", "color2": "#HEX"}} ],
  "stroke_color": "#HEX",
  "logos": [ {"panel_index": N, "url_or_data": "url_or_base64", "opacity": 1.0, "scale": 0.5} ]
}
Renk anlayışı: Barcelona(#A50044, #004D98), Lüks(#000000, #D4AF37), Klasik(siyah-beyaz).
Eğer belirsizse makul doldur. SADECE JSON ver.`;

                try {
                    const res = await fetch("https://api.anthropic.com/v1/messages", {
                        method: "POST",
                        headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerously-allow-browser": "true" },
                        body: JSON.stringify({
                            model: "claude-3-5-sonnet-20241022", max_tokens: 1500, system: sysPrompt,
                            messages: [{ role: "user", content: naturalLanguage }]
                        })
                    });
                    const result = await res.json();
                    if(result.content) {
                        const jsonStr = result.content[0].text.replace(/```json/g, '').replace(/```/g, '').trim();
                        const parsed = JSON.parse(jsonStr);
                        if(parsed.ball_type) setBallType(parsed.ball_type);
                        
                        // Merge with existing defaults
                        const newPanels = initPanels(parsed.ball_type || ballType);
                        if(parsed.panels) {
                            parsed.panels.forEach(aiP => {
                                if(aiP.index < newPanels.length) newPanels[aiP.index] = {...newPanels[aiP.index], ...aiP};
                            });
                        }
                        setPanels(newPanels);
                        if(parsed.stroke_color) setStrokeColor(parsed.stroke_color);
                        if(parsed.logos) setLogos(parsed.logos);
                    }
                } catch (e) {
                    alert("AI İşlemi başarısız.");
                    console.error(e);
                } finally { setIsLoading(false); }
            };

            const downloadJson = () => {
                const data = { ball_type: ballType, panels, stroke_color: strokeColor, logos };
                const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `tasarim_${Date.now()}.json`;
                a.click();
            };

            return (
                <div className="min-h-screen p-4 flex flex-col gap-4 max-w-[1400px] mx-auto text-sm">
                    {/* Header */}
                    <header className="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                        <div>
                            <h1 className="text-2xl font-bold text-indigo-700">Top Tasarım Stüdyosu Pro</h1>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={()=>setShowThemes(true)} className="bg-orange-100 text-orange-700 px-4 py-2 rounded font-medium hover:bg-orange-200">Hızlı Şablonlar</button>
                            <input type="password" placeholder="Anthropic API Key" className="px-3 py-1 border rounded w-48 text-xs" value={apiKey} onChange={e=>setApiKey(e.target.value)} />
                        </div>
                    </header>

                    <div className="grid grid-cols-12 gap-4 h-[calc(100vh-120px)]">
                        {/* Sol Menü: Kayıtlar & Temel */}
                        <div className="col-span-2 flex flex-col gap-4 overflow-y-auto">
                            <div className="bg-white p-4 rounded-xl border border-slate-200">
                                <h3 className="font-bold mb-3">Model</h3>
                                <select value={ballType} onChange={e=>setBallType(e.target.value)} className="w-full p-2 border rounded bg-slate-50">
                                    <option value="soccer">Futbol Topu (32 Panel)</option>
                                    <option value="volleyball">Voleybol Topu (18 Panel)</option>
                                </select>
                                <div className="mt-4">
                                    <label className="text-xs text-slate-500 block mb-1">Dikiş Rengi</label>
                                    <input type="color" value={strokeColor} onChange={e=>setStrokeColor(e.target.value)} className="w-full h-8" />
                                </div>
                            </div>

                            <div className="bg-white p-4 rounded-xl border border-slate-200 flex-1">
                                <h3 className="font-bold mb-3">Kütüphane</h3>
                                <button onClick={saveDesign} className="w-full bg-slate-100 py-2 rounded text-slate-700 hover:bg-slate-200 mb-3">+ Tasarımı Kaydet</button>
                                <ul className="space-y-2">
                                    {savedDesigns.map((d, i) => (
                                        <li key={i} className="p-2 bg-slate-50 border rounded cursor-pointer hover:border-indigo-400" onClick={()=>loadDesign(d)}>
                                            {d.name}
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        </div>

                        {/* Orta: Paneller ve Logolar */}
                        <div className="col-span-3 bg-white p-4 rounded-xl border border-slate-200 overflow-y-auto">
                            <h3 className="font-bold mb-3">Paneller</h3>
                            <div className="space-y-3">
                                {panels.map((p, i) => (
                                    <div key={i} className="p-3 bg-slate-50 border rounded-lg">
                                        <div className="flex justify-between items-center mb-2">
                                            <span className="font-semibold text-xs">Panel {i}</span>
                                            <select value={p.fill_type} onChange={e=>updatePanel(i, 'fill_type', e.target.value)} className="text-xs border rounded p-1">
                                                <option value="solid">Düz Renk</option>
                                                <option value="gradient">Gradyan</option>
                                                <option value="pattern">Desen</option>
                                            </select>
                                        </div>
                                        {p.fill_type === 'solid' && (
                                            <input type="color" value={p.fill} onChange={e=>updatePanel(i, 'fill', e.target.value)} className="w-full h-8" />
                                        )}
                                        {p.fill_type === 'gradient' && (
                                            <div className="flex gap-2">
                                                <input type="color" value={p.gradient.from} onChange={e=>updatePanel(i, 'gradient', e.target.value, 'from')} className="w-1/2 h-8" />
                                                <input type="color" value={p.gradient.to} onChange={e=>updatePanel(i, 'gradient', e.target.value, 'to')} className="w-1/2 h-8" />
                                            </div>
                                        )}
                                        {p.fill_type === 'pattern' && (
                                            <div className="flex gap-2">
                                                <input type="color" value={p.pattern.color1} onChange={e=>updatePanel(i, 'pattern', e.target.value, 'color1')} className="w-1/2 h-8" title="Arkaplan" />
                                                <input type="color" value={p.pattern.color2} onChange={e=>updatePanel(i, 'pattern', e.target.value, 'color2')} className="w-1/2 h-8" title="Desen Rengi" />
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>

                            <h3 className="font-bold mt-6 mb-3">Logolar</h3>
                            <button onClick={addLogo} className="w-full bg-slate-100 py-2 rounded text-slate-700 mb-3">+ Logo Ekle</button>
                            {logos.map((l, idx) => (
                                <div key={idx} className="p-2 bg-slate-50 border rounded mb-2 text-xs">
                                    <input type="number" placeholder="Panel Index" value={l.panel_index} onChange={e=>updateLogo(idx, 'panel_index', parseInt(e.target.value))} className="w-full mb-1 p-1 border" />
                                    <input type="text" placeholder="URL veya Base64" value={l.url_or_data} onChange={e=>updateLogo(idx, 'url_or_data', e.target.value)} className="w-full mb-1 p-1 border" />
                                    <div className="flex gap-2">
                                        <input type="range" min="0" max="1" step="0.1" value={l.opacity} onChange={e=>updateLogo(idx, 'opacity', parseFloat(e.target.value))} className="w-1/2" title="Şeffaflık" />
                                        <input type="range" min="0.1" max="1.5" step="0.1" value={l.scale} onChange={e=>updateLogo(idx, 'scale', parseFloat(e.target.value))} className="w-1/2" title="Ölçek" />
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* Sağ: Önizleme ve AI */}
                        <div className="col-span-7 flex flex-col gap-4">
                            <div className="bg-white p-4 rounded-xl border border-slate-200 flex-1 flex flex-col relative">
                                <div className="flex justify-between items-center mb-2">
                                    <h3 className="font-bold">Canlı Önizleme</h3>
                                    <button onClick={()=>setZoom(!zoom)} className="text-xs bg-slate-100 px-3 py-1 rounded hover:bg-slate-200">
                                        {zoom ? "Uzaklaş" : "Yakınlaş"}
                                    </button>
                                </div>
                                <div className={`bg-slate-50 flex-1 border rounded flex items-center justify-center svg-container ${zoom?'zoom-in':''}`} dangerouslySetInnerHTML={{__html: svgContent}} ref={svgRef}></div>
                                <p className="text-[10px] text-slate-400 mt-2 text-center">Bu önizleme dijitaldir. Üretilen topta klişe baskı kalitesi ve renklerde küçük farklılıklar olabilir.</p>
                            </div>

                            <div className="bg-indigo-50 p-4 rounded-xl border border-indigo-100">
                                <h3 className="font-bold text-indigo-900 mb-2 flex items-center gap-2">
                                    <span className="bg-indigo-600 text-white px-2 py-0.5 rounded text-xs">AI Studio</span> Doğal Dil ile Tasarım
                                </h3>
                                <textarea rows="2" className="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="'Gece yarısı temalı, kırmızı detaylı bir top...'" value={naturalLanguage} onChange={e=>setNaturalLanguage(e.target.value)}></textarea>
                                <div className="mt-2 flex justify-between items-center">
                                    <button onClick={handleAIProcess} disabled={isLoading} className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded shadow text-sm disabled:opacity-50">
                                        {isLoading ? "Düşünüyor..." : "AI Üret"}
                                    </button>
                                    <button onClick={downloadJson} className="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded shadow text-sm">
                                        Üretim JSON İndir
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Temalar Modalı */}
                    {showThemes && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
                            <div className="bg-white p-6 rounded-2xl w-[600px] shadow-2xl">
                                <h2 className="text-xl font-bold mb-4">Hızlı Başlangıç Şablonları</h2>
                                <div className="grid grid-cols-2 gap-3 max-h-[400px] overflow-y-auto">
                                    {THEMES.map((t, i) => (
                                        <button key={i} onClick={()=>loadDesign(t)} className="p-3 border rounded text-left hover:bg-indigo-50 hover:border-indigo-300 transition">
                                            <div className="font-semibold">{t.name}</div>
                                            <div className="text-xs text-slate-500">{t.type === 'soccer' ? 'Futbol' : 'Voleybol'}</div>
                                        </button>
                                    ))}
                                </div>
                                <div className="mt-4 flex justify-end">
                                    <button onClick={()=>setShowThemes(false)} className="bg-slate-200 px-4 py-2 rounded">Kapat</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
